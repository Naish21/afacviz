# ===========================================================================
#  Panel de administración del AFAC (Decap CMS)
#  Accede en:  https://afacviz.com/admin/
# ===========================================================================
#
#  AUTENTICACIÓN (cómo se inicia sesión para editar la web)
#  ---------------------------------------------------------------------------
#  Por defecto se usa "git-gateway" + Netlify Identity. OJO: Netlify Identity
#  y Git Gateway están DEPRECADOS y es posible que en un sitio nuevo no puedas
#  activarlos. Si es tu caso, usa DecapBridge (gratuito) descomentando el
#  bloque de más abajo. Tienes el paso a paso en SETUP-AMPA.md.
# ---------------------------------------------------------------------------

# --- OPCIÓN A: Netlify Identity + Git Gateway (legado) ---
backend:
  name: git-gateway
  branch: main

# --- OPCIÓN B: DecapBridge (recomendado si no puedes usar Identity) ---
# Regístrate gratis en https://decapbridge.com, conecta este repositorio y
# pega los valores que te dé. Luego comenta el bloque de la OPCIÓN A y
# descomenta este:
#
# backend:
#   name: git-gateway
#   repo: Naish21/afacviz
#   branch: main
#   identity_url: https://auth.decapbridge.com/sites/TU-SITE-ID
#   gateway_url: https://gateway.decapbridge.com

# Para probar en tu ordenador en local: descomenta y ejecuta `npx decap-server`.
# local_backend: true

# Flujo borrador -> revisión -> publicado (si varias personas editan):
# publish_mode: editorial_workflow

locale: 'es'

editor:
  preview: false

display_url: https://afacviz.com
media_folder: 'public/media'
public_folder: '/media'

collections:
  # ------------------------- PÁGINAS FIJAS -------------------------
  - name: 'page'
    label: 'Páginas'
    files:
      - file: 'content/page/home.md'
        label: 'Inicio'
        name: 'home'
        fields:
          - { label: 'Título', name: 'title', widget: string }
          - { label: 'Descripción', name: 'description', widget: 'text' }

      - file: 'content/page/about.md'
        label: 'Sobre el AFAC'
        name: 'about'
        fields:
          - { label: 'Título', name: 'title', widget: 'string' }
          - { label: 'Contenido', name: 'description', widget: 'markdown', sanitize_preview: true }

      - file: 'content/page/contact.md'
        label: 'Contacto'
        name: 'contact'
        fields:
          - { label: 'Título', name: 'title', widget: 'string' }
          - { label: 'Contenido', name: 'description', widget: 'text' }

  # ------------------------- NOTICIAS -------------------------
  - name: 'blog'
    label: 'Noticias'
    label_singular: 'Noticia'
    folder: 'content/blog'
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{title}}'
    view_groups:
      - label: Año
        field: date
        pattern: \d{4}
    fields:
      - { label: 'Tipo', name: 'templateKey', widget: 'hidden', default: 'blog' }
      - { label: 'Título', name: 'title', widget: string }
      - { label: 'Destacada en portada', name: 'featured', widget: boolean, default: false }
      - { label: 'Resumen', name: 'description', widget: 'text', required: false }
      - { label: 'Cuerpo', name: 'body', widget: 'markdown', sanitize_preview: true }
      - { label: 'Etiquetas', name: 'tags', widget: 'list' }
      - { label: 'Fecha de publicación', name: 'date', widget: 'datetime' }

  # ------------------------- ACTIVIDADES -------------------------
  - name: 'inspiration'
    label: 'Actividades'
    label_singular: 'Actividad'
    folder: 'content/inspiration'
    create: true
    slug: '{{title}}'
    extension: mdx
    format: frontmatter
    fields:
      - { label: 'Tipo', name: 'templateKey', widget: 'hidden', default: 'inspiration' }
      - { label: 'Título', name: 'title', widget: string }
      - { label: 'Destacada en portada', name: 'featured', widget: boolean, default: true }
      - { label: 'Resumen', name: 'description', widget: 'text', required: false }
      - { label: 'Imagen', name: 'image', widget: 'image', choose_url: false }
      - { label: 'Descripción', name: 'body', widget: 'markdown', sanitize_preview: true, minimal: true }
      - { label: 'Etiquetas', name: 'tags', widget: 'list' }
      - { label: 'Fecha', name: 'date', widget: 'datetime' }

  # ------------------------- EVENTOS -------------------------
  - name: 'podcasts'
    label: 'Eventos'
    label_singular: 'Evento'
    folder: 'content/podcasts'
    create: true
    slug: '{{title}}'
    view_groups:
      - label: Año
        field: date
        pattern: \d{4}
    fields:
      - { label: 'Tipo', name: 'templateKey', widget: 'hidden', default: 'podcasts' }
      - { label: 'Título', name: 'title', widget: string }
      - { label: 'Destacado en portada', name: 'featured', widget: boolean, default: true }
      - { label: 'Resumen', name: 'description', widget: 'text', required: false }
      - { label: 'Enlace (inscripción/info)', name: 'link', widget: string, required: false, default: '#' }
      - { label: 'Imagen', name: 'image', widget: 'image', choose_url: false }
      - { label: 'Detalles', name: 'body', widget: 'markdown', sanitize_preview: true, minimal: true }
      - { label: 'Etiquetas', name: 'tags', widget: 'list' }
      - { label: 'Fecha del evento', name: 'date', widget: 'datetime' }

  # ------------------------- SERVICIOS -------------------------
  - name: 'tools'
    label: 'Servicios'
    label_singular: 'Servicio'
    folder: 'content/tools'
    create: true
    slug: '{{title}}'
    fields:
      - { label: 'Tipo', name: 'templateKey', widget: 'hidden', default: 'tools' }
      - { label: 'Título', name: 'title', widget: string }
      - { label: 'Destacado en portada', name: 'featured', widget: boolean, default: true }
      - { label: 'Resumen', name: 'description', widget: 'text', required: false }
      - { label: 'Imagen', name: 'image', widget: 'image', choose_url: false }
      - { label: 'Enlace (más info/inscripción)', name: 'link', widget: string, required: false, default: '#' }
      - { label: 'Descripción', name: 'body', widget: 'markdown', sanitize_preview: true, minimal: true }
      - { label: 'Etiquetas', name: 'tags', widget: 'list' }
      - { label: 'Fecha', name: 'date', widget: 'datetime' }

  # ------------------------- DOCUMENTOS -------------------------
  - name: 'resources'
    label: 'Documentos'
    label_singular: 'Documento'
    folder: 'content/resources'
    create: true
    slug: '{{title}}'
    fields:
      - { label: 'Tipo', name: 'templateKey', widget: 'hidden', default: 'resources' }
      - { label: 'Título', name: 'title', widget: string }
      - { label: 'Destacado en portada', name: 'featured', widget: boolean, default: false }
      - { label: 'Resumen', name: 'description', widget: 'text', required: false }
      - { label: 'Imagen', name: 'image', widget: 'image', choose_url: false }
      - { label: 'Archivo o enlace (PDF)', name: 'link', widget: 'file', required: false, default: '#' }
      - { label: 'Descripción', name: 'body', widget: 'markdown', sanitize_preview: true, minimal: true }
      - { label: 'Etiquetas', name: 'tags', widget: 'list' }
      - { label: 'Fecha', name: 'date', widget: 'datetime' }
